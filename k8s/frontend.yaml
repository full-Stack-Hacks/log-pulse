# Build and push the image before applying:
#   docker build -t your-registry/log-pulse-frontend:latest ./frontend
#   docker push your-registry/log-pulse-frontend:latest
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/log-pulse-frontend:latest
          ports:
            - containerPort: 5173

---
# NodePort — exposes the dashboard outside the cluster on port 30573
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30573
